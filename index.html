<script>
(function () {
    // Design-ui pages are single compositions, so the whole body is editable.
    function markEditable() {
        document.body.classList.add('artifact-editable');
    }

    // Credit badge with idle-fade. Hover devices only.
    function initChromeUI() {
        if (!matchMedia('(hover: hover)').matches) return;

        var credit = document.createElement('div');
        credit.className = 'design-ui-credit';
        credit.setAttribute('aria-hidden', 'true');
        credit.innerHTML = '\u{1F49C} by ClickUp Brain';
        document.body.appendChild(credit);

        var timer = null;
        var fade = function (out) { credit.style.opacity = out ? '0' : ''; };
        fade(true);
        var show = function () {
            fade(false);
            clearTimeout(timer);
            timer = setTimeout(function () { fade(true); }, 3000);
        };
        document.addEventListener('mousemove', show);
        show();
    }

    function init() {
        markEditable();
        initChromeUI();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();

</script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #040208;
  font-family: 'Courier New', monospace;

#phaseLabel {

#startScreen .subtitle { color: rgba(180,140,200,0.65); font-size: clamp(11px,1.5vw,13px); margin-bottom: 28px; text-align: center; max-width: 360px; padding: 0 24px; line-height: 1.7; }

.game-btn {

  border: none; border-radius: 40px; cursor: pointer; letter-spacing: 0.12em;

}

#endScreen { background: radial-gradient(ellipse at 50% 40%, #0a2030, #100520 60%, #080510 100%); display: none; }
#endScreen h1 { font-size: clamp(22px,4.5vw,42px); color: #6ee7c0; text-shadow: 0 0 25px rgba(110,231,192,0.4); margin-bottom: 8px; }
#endScreen p { color: rgba(140,210,190,0.7); font-size: 13px; margin-bottom: 22px; }

#mobileControls {
  position: absolute; bottom: 16px; left: 12px; right: 12px;
  display: flex; justify-content: space-between; align-items: flex-end;
  pointer-events: all; z-index: 20;
}
#dpad { position: relative; width: 125px; height: 125px; }
.dpad-btn {
  position: absolute; width: 42px; height: 42px;
  background: rgba(180,80,140,0.12); border: 1.5px solid rgba(200,100,160,0.3);
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
  color: rgba(230,170,210,0.75); font-size: 15px;
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
}
.dpad-btn:active { background: rgba(200,80,150,0.3); }
#dpad-up { top: 0; left: 50%; transform: translateX(-50%); }
#dpad-down { bottom: 0; left: 50%; transform: translateX(-50%); }
#dpad-left { left: 0; top: 50%; transform: translateY(-50%); }
#dpad-right { right: 0; top: 50%; transform: translateY(-50%); }

#actionBtns { display: flex; flex-direction: column; gap: 10px; align-items: center; }
.action-btn {
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-family: 'Courier New', monospace; font-weight: bold;
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
}
#shootBtn {
  width: 58px; height: 58px; font-size: 20px;

}
#jumpBtn {

  color: rgba(190,160,240,0.8);

@media (min-width: 769px) and (hover: hover) { #mobileControls { display: none; } }

<body>
<div id="gameContainer">
  <canvas id="game"></canvas>
  <div id="ui">
    <div id="hud">
      <div id="progressWrap">
        <span id="progressIcon">💧</span>
        <div id="progressBar"><div id="progressFill"></div></div>
      </div>
      <div id="hearts"></div>

    </div>

  </div>
  <div class="screen-overlay" id="startScreen">

    </div>

      <button class="action-btn" id="shootBtn">🏹</button>
      <button class="action-btn" id="jumpBtn">SALTO</button>
    </div>
  </div>
</div>

<script>
// FIXED internal resolution - game always renders at this size
const GW = 960;  // game width
const GH = 540;  // game height
const GROUND_Y = 420; // fixed ground line position

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = GW;
canvas.height = GH;

// Scale canvas to fit screen while keeping aspect ratio
function fitCanvas() {
  const windowW = window.innerWidth;
  const windowH = window.innerHeight;
  const ratio = GW / GH;
  let displayW, displayH;
  if (windowW / windowH > ratio) {
    displayH = windowH;
    displayW = windowH * ratio;
  } else {
    displayW = windowW;
    displayH = windowW / ratio;
  }
  canvas.style.width = displayW + 'px';
  canvas.style.height = displayH + 'px';
}
fitCanvas();
window.addEventListener('resize', fitCanvas);

const GRAVITY = 0.55;
const DROPS_TO_TRANSITION = 15;

const STATE = { MENU:0, PLAYING:1, GAMEOVER:2, WIN:3 };
let gameState = STATE.MENU;
let phase = 0, score = 0, dropsCollected = 0, transitionProgress = 0;
let gameTime = 0, cameraX = 0;
const worldLength = 5000;
const wallX = worldLength - 250;
let wallBroken = false, wallBreakTime = 0, shakeAmount = 0;

const player = {
  x:100, y:0, vy:0, vx:0,
  w:34, h:52, grounded:false, facing:1,
  shooting:false, shootTimer:0,
  speed:3.5, jumpForce:-11.5,
  frame:0, animTimer:0, wingFrame:0, wingTimer:0,
  invincible:0, hp:3, maxHp:3
};

let arrows=[], hearts=[], toxicTexts=[], particles=[], drops=[], platforms=[], groundObstacles=[], bgStars=[];

const toxicPhrases=["ya no te quiero","fue tu culpa","no vales nada","nunca cambiarás","no eres suficiente","te olvidé","solo fue un juego","me aburriste"];

function genStars(){bgStars=[];for(let i=0;i<60;i++){bgStars.push({x:Math.random()*GW*4,y:Math.random()*(GROUND_Y-40),sz:0.5+Math.random()*1,ts:0.02+Math.random()*0.03,to:Math.random()*Math.PI*2});}}
genStars();

function renderHearts(){
  const c=document.getElementById('hearts');c.innerHTML='';
  for(let i=0;i<player.maxHp;i++){
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 24 24');svg.classList.add('heart-icon');
    if(i>=player.hp)svg.classList.add('empty');
    svg.innerHTML=`<path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="${i<player.hp?'#e84393':'#2a1020'}"/>`;
    c.appendChild(svg);
  }
}

function generateWorld(){
  platforms=[];hearts=[];toxicTexts=[];drops=[];arrows=[];particles=[];groundObstacles=[];

  // Platforms at varied heights (relative to GROUND_Y)
  let px=200;
  for(let i=0;i<55;i++){
    const cluster=i%5;
    let py;
    if(cluster===0) py=GROUND_Y-55-Math.random()*15;
    else if(cluster===1) py=GROUND_Y-95-Math.random()*15;
    else if(cluster===2) py=GROUND_Y-135-Math.random()*10;
    else if(cluster===3) py=GROUND_Y-90-Math.random()*15;
    else py=GROUND_Y-50-Math.random()*15;
    const pw=65+Math.random()*70;
    platforms.push({x:px,y:py,w:pw,h:10});
    px+=105+Math.random()*85;
  }

  // Ground obstacles
  let ox=300;
  for(let i=0;i<20;i++){
    const type=Math.random()>0.5?'spikes':'barrier';
    groundObstacles.push({
      x:ox, y:GROUND_Y-(type==='barrier'?38:16),
      w:type==='barrier'?30:42, h:type==='barrier'?38:16,
      type, alive:true, hp:type==='barrier'?2:0
    });
    ox+=220+Math.random()*160;
  }

  // Hearts
  for(let i=0;i<22;i++){
    const hx=250+(i/22)*(worldLength-450);
    const hy=GROUND_Y-75-Math.random()*130;
    hearts.push({x:hx,y:hy,baseY:hy,size:14+Math.random()*7,hp:2,alive:true,floatOffset:Math.random()*Math.PI*2});
  }

  // Toxic texts
  for(let i=0;i<12;i++){
    const tx=380+(i/12)*(worldLength-550);
    const ty=GROUND_Y-80-Math.random()*120;
    toxicTexts.push({x:tx,y:ty,baseX:tx,baseY:ty,text:toxicPhrases[Math.floor(Math.random()*toxicPhrases.length)],speed:0.3+Math.random()*0.4,amplitude:18+Math.random()*22,offset:Math.random()*Math.PI*2,alive:true,lifetime:270+Math.random()*160,spawnTime:0,visible:false,fadeIn:0});
  }
}

// Input
const keys={};
let touchState={left:false,right:false,up:false,shoot:false};
window.addEventListener('keydown',e=>{keys[e.code]=true;if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.code]=false;});

function setupMobile(){
  const map={'dpad-up':'up','dpad-left':'left','dpad-right':'right','dpad-down':'down','shootBtn':'shoot','jumpBtn':'up'};
  Object.entries(map).forEach(([id,dir])=>{
    const el=document.getElementById(id);if(!el)return;
    el.addEventListener('touchstart',e=>{e.preventDefault();touchState[dir]=true;},{passive:false});
    el.addEventListener('touchend',e=>{e.preventDefault();touchState[dir]=false;},{passive:false});
    el.addEventListener('touchcancel',()=>{touchState[dir]=false;});
  });
}
setupMobile();

function iL(){return keys['ArrowLeft']||keys['KeyA']||touchState.left;}
function iR(){return keys['ArrowRight']||keys['KeyD']||touchState.right;}
function iU(){return keys['ArrowUp']||keys['KeyW']||keys['Space']||touchState.up;}
function iS(){return keys['KeyX']||keys['KeyZ']||keys['Enter']||touchState.shoot;}

document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('retryBtn').addEventListener('click',startGame);
document.getElementById('restartBtn').addEventListener('click',startGame);

function startGame(){
  document.getElementById('startScreen').style.display='none';
  document.getElementById('gameOverScreen').style.display='none';
  document.getElementById('endScreen').style.display='none';
  gameState=STATE.PLAYING;phase=0;score=0;dropsCollected=0;
  transitionProgress=0;gameTime=0;cameraX=0;
  wallBroken=false;wallBreakTime=0;shakeAmount=0;
  player.x=100;player.y=GROUND_Y-player.h;
  player.vy=0;player.vx=0;player.hp=3;player.invincible=0;player.facing=1;
  generateWorld();renderHearts();updateHUD();
}

function gameOver(){gameState=STATE.GAMEOVER;document.getElementById('goScore').textContent=`Puntos: ${score}`;document.getElementById('gameOverScreen').style.display='flex';}
function winGame(){gameState=STATE.WIN;document.getElementById('endScreen').style.display='flex';}

function updateHUD(){
  document.getElementById('score').textContent=`✦ ${score}`;
  const pct=Math.min(100,(dropsCollected/DROPS_TO_TRANSITION)*100);
  document.getElementById('progressFill').style.width=pct+'%';
  if(phase===1){document.getElementById('progressFill').style.background='linear-gradient(90deg,#00cec9,#ff7eb3)';document.getElementById('progressIcon').textContent='✦';}
}
function showPhaseLabel(t){const el=document.getElementById('phaseLabel');el.textContent=t;el.style.opacity=1;setTimeout(()=>{el.style.opacity=0;},2800);}

function shootArrow(){
  if(player.shootTimer>0)return;
  player.shootTimer=phase===1?12:18;player.shooting=true;
  setTimeout(()=>{player.shooting=false;},140);
  arrows.push({x:player.x+(player.facing>0?player.w:0),y:player.y+player.h*0.35,vx:player.facing*(phase===1?12:8.5),vy:0,life:80,power:phase===1?2:1});
}

function spawnP(x,y,n,type,sp){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-0.5)*sp,vy:(Math.random()-0.8)*sp,life:18+Math.random()*20,maxLife:38,size:2+Math.random()*2.8,type});}
function spawnDrop(x,y){drops.push({x,y,vy:-2.2-Math.random()*1.8,vx:(Math.random()-0.5)*1.8,life:220,size:7,collected:false});}

// UPDATE
function update(){
  if(gameState!==STATE.PLAYING)return;
  gameTime++;
  const spd=phase===1?player.speed*1.4:player.speed;
  if(iL()){player.vx=-spd;player.facing=-1;}
  else if(iR()){player.vx=spd;player.facing=1;}
  else{player.vx*=0.76;}

  if(iU()&&player.grounded){player.vy=player.jumpForce*(phase===1?1.12:1);player.grounded=false;}
  if(iS())shootArrow();
  if(player.shootTimer>0)player.shootTimer--;

  player.vy+=GRAVITY;
  player.x+=player.vx;
  player.y+=player.vy;

  if(player.y+player.h>=GROUND_Y){player.y=GROUND_Y-player.h;player.vy=0;player.grounded=true;}
  else{player.grounded=false;}

  for(const p of platforms){
    if(player.vy>0&&player.x+player.w>p.x&&player.x<p.x+p.w&&player.y+player.h>=p.y&&player.y+player.h<=p.y+p.h+player.vy+7){
      player.y=p.y-player.h;player.vy=0;player.grounded=true;
    }
  }

  // Wall blocks until phase 1
  if(!wallBroken){
    if(phase===0&&player.x+player.w>wallX){player.x=wallX-player.w;player.vx=0;}
    if(phase===1&&player.x+player.w>wallX){
      wallBroken=true;wallBreakTime=gameTime;shakeAmount=12;
      spawnP(wallX,GROUND_Y-80,25,'neon',12);showPhaseLabel('✦ ¡LIBRE! ✦');
      setTimeout(winGame,2000);
    }
  }

  // Ground obstacles
  for(const ob of groundObstacles){
    if(!ob.alive)continue;
    if(player.x+player.w>ob.x&&player.x<ob.x+ob.w&&player.y+player.h>ob.y&&player.y<ob.y+ob.h){
      if(ob.type==='spikes'){
        if(player.invincible<=0){
          player.hp--;player.invincible=65;shakeAmount=5;
          player.vx=-player.facing*4;player.vy=-4;
          spawnP(player.x+player.w/2,player.y+player.h/2,4,'damage',4);
          renderHearts();if(player.hp<=0){gameOver();return;}
        }
      }else{
        if(player.vx>0){player.x=ob.x-player.w;player.vx=0;}
        else if(player.vx<0){player.x=ob.x+ob.w;player.vx=0;}
      }
    }
  }

  if(player.x<15)player.x=15;
  if(player.x>worldLength-35)player.x=worldLength-35;

  const targetCam=player.x-GW*0.3;
  cameraX+=(targetCam-cameraX)*0.07;
  if(cameraX<0)cameraX=0;

  // Arrows
  for(let i=arrows.length-1;i>=0;i--){
    const a=arrows[i];a.x+=a.vx;a.life--;
    if(a.life<=0){arrows.splice(i,1);continue;}
    let rm=false;
    for(const h of hearts){
      if(!h.alive)continue;
      if(Math.abs(a.x-h.x)<h.size+7&&Math.abs(a.y-h.y)<h.size+7){
        h.hp-=a.power;
        if(h.hp<=0){h.alive=false;score+=10;spawnP(h.x,h.y,8,phase===1?'neon':'pink',6);spawnDrop(h.x,h.y);if(Math.random()>0.5)spawnDrop(h.x+8,h.y-5);shakeAmount=3;}
        else{spawnP(h.x,h.y,3,'pink',3);shakeAmount=1.5;}
        arrows.splice(i,1);rm=true;break;
      }
    }
    if(rm)continue;
    for(const ob of groundObstacles){
      if(!ob.alive||ob.type!=='barrier')continue;
      if(a.x>ob.x&&a.x<ob.x+ob.w&&a.y>ob.y&&a.y<ob.y+ob.h){
        ob.hp-=a.power;
        if(ob.hp<=0){ob.alive=false;score+=5;spawnP(ob.x+ob.w/2,ob.y+ob.h/2,7,phase===1?'neon':'pink',5);shakeAmount=2.5;}
        else{spawnP(ob.x+ob.w/2,ob.y+ob.h/2,3,'pink',3);}
        arrows.splice(i,1);rm=true;break;
      }
    }
    if(rm)continue;
    if(phase===1){for(const t of toxicTexts){if(!t.alive||!t.visible)continue;if(Math.abs(a.x-t.x)<45&&Math.abs(a.y-t.y)<14){t.alive=false;score+=5;spawnP(t.x,t.y,5,'neon',4);arrows.splice(i,1);break;}}}
  }

  for(const h of hearts){if(!h.alive)continue;h.y=h.baseY+Math.sin(gameTime*0.02+h.floatOffset)*8;}

  for(const t of toxicTexts){
    if(!t.alive)continue;
    const dist=Math.abs(player.x-t.baseX);
    if(!t.visible&&dist<400){t.visible=true;t.spawnTime=gameTime;t.fadeIn=0;}
    if(!t.visible)continue;
    if(t.fadeIn<1)t.fadeIn=Math.min(1,t.fadeIn+0.03);
    const age=gameTime-t.spawnTime;
    if(age>t.lifetime){t.fadeIn-=0.04;if(t.fadeIn<=0){t.alive=false;continue;}}
    t.x=t.baseX+Math.sin(gameTime*0.012+t.offset)*t.amplitude;
    t.y=t.baseY+Math.cos(gameTime*0.01+t.offset)*8;
    if(player.invincible<=0&&t.fadeIn>0.5){
      const dx=player.x+player.w/2-t.x,dy=player.y+player.h/2-t.y;
      if(Math.abs(dx)<36&&Math.abs(dy)<15){
        player.hp--;player.invincible=65;shakeAmount=5;
        spawnP(player.x+player.w/2,player.y+player.h/2,4,'damage',4);
        renderHearts();if(player.hp<=0){gameOver();return;}
      }
    }
  }

  if(player.invincible>0)player.invincible--;

  for(let i=drops.length-1;i>=0;i--){
    const d=drops[i];d.vy+=0.2;d.x+=d.vx;d.y+=d.vy;d.life--;
    if(d.y>GROUND_Y-5){d.y=GROUND_Y-5;d.vy=0;d.vx=0;}
    const dx=player.x+player.w/2-d.x,dy=player.y+player.h/2-d.y;
    if(Math.sqrt(dx*dx+dy*dy)<32&&!d.collected){
      d.collected=true;dropsCollected++;score+=5;
      spawnP(d.x,d.y,4,phase===1?'neon':'glow',3);drops.splice(i,1);
      if(dropsCollected>=DROPS_TO_TRANSITION&&phase===0){phase=1;transitionProgress=0;showPhaseLabel('✦ RESURGIMIENTO ✦');spawnP(player.x,player.y,20,'neon',9);shakeAmount=7;}
      updateHUD();continue;
    }
    if(d.life<=0)drops.splice(i,1);
  }

  if(phase===1&&transitionProgress<1)transitionProgress+=0.005;
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life--;if(p.life<=0)particles.splice(i,1);}
  if(shakeAmount>0)shakeAmount*=0.84;
  player.animTimer++;if(player.animTimer>7){player.animTimer=0;player.frame=(player.frame+1)%4;}
  player.wingTimer++;if(player.wingTimer>5){player.wingTimer=0;player.wingFrame=(player.wingFrame+1)%4;}
  updateHUD();
}

// DRAW
function draw(){
  ctx.clearRect(0,0,GW,GH);
  ctx.save();
  if(shakeAmount>0.5)ctx.translate((Math.random()-0.5)*shakeAmount,(Math.random()-0.5)*shakeAmount);
  drawSky();drawMoon();drawStars();drawBgCity();drawGround();
  drawPlatforms();drawGroundObs();drawWall();
  drawDrops();drawHearts();drawToxic();drawArrows();drawPlayer();drawParticles();drawVignette();
  ctx.restore();
}

function drawSky(){
  const t=phase===1?transitionProgress:0;
  const grad=ctx.createLinearGradient(0,0,0,GROUND_Y);
  if(t<0.5){grad.addColorStop(0,'#050310');grad.addColorStop(0.5,'#0a0618');grad.addColorStop(1,'#151020');}
  else{const m=(t-0.5)*2;grad.addColorStop(0,lC('#050310','#060a14',m));grad.addColorStop(0.5,lC('#0a0618','#08101e',m));grad.addColorStop(1,lC('#151020','#12182a',m));}
  ctx.fillStyle=grad;ctx.fillRect(0,0,GW,GROUND_Y);
}

function drawMoon(){
  const t=phase===1?transitionProgress:0;
  const mx=GW*0.82-cameraX*0.01,my=60,r=22;
  const grd=ctx.createRadialGradient(mx,my,0,mx,my,r*2.5);
  grd.addColorStop(0,t>0.5?'rgba(232,67,147,0.06)':'rgba(200,180,220,0.05)');grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd;ctx.fillRect(mx-r*3,my-r*3,r*6,r*6);
  ctx.fillStyle=t>0.5?'rgba(230,170,210,0.1)':'rgba(200,190,220,0.08)';
  ctx.beginPath();ctx.arc(mx,my,r,0,Math.PI*2);ctx.fill();
}

function drawStars(){
  const t=phase===1?transitionProgress:0;const px=cameraX*0.03;
  for(const s of bgStars){
    const sx=(s.x-px)%(GW+60);if(sx<-2||sx>GW+2)continue;
    const tw=0.25+Math.sin(gameTime*s.ts+s.to)*0.2;
    ctx.fillStyle=t>0.5?(s.to>3?`rgba(232,130,180,${tw*0.45})`:`rgba(130,200,220,${tw*0.4})`):`rgba(190,180,220,${tw*0.4})`;
    ctx.beginPath();ctx.arc(sx,s.y,s.sz,0,Math.PI*2);ctx.fill();
  }
}

function drawBgCity(){
  const t=phase===1?transitionProgress:0;const px=cameraX*0.1;
  for(let i=0;i<30;i++){
    const bx=i*160+30-(px%(160*30));if(bx<-80||bx>GW+80)continue;
    const bh=25+(i*37%70),bw=22+(i*23%35),by=GROUND_Y-bh;
    if(t>0.3){
      ctx.fillStyle='#0a071a';ctx.fillRect(bx,by,bw,bh);
      const rows=Math.floor(bh/11);
      for(let r=0;r<rows;r++){for(let c=0;c<2;c++){
        if((i+r+c)%4!==0)continue;
        ctx.fillStyle=(i+r)%3===0?`rgba(232,67,147,${0.18+t*0.18})`:`rgba(0,206,201,${0.12+t*0.12})`;
        ctx.fillRect(bx+2+c*(bw/2),by+2+r*11,bw/2-4,5);
      }}
    }else{
      ctx.fillStyle=`rgba(10,7,18,${0.45+(i%3)*0.1})`;ctx.fillRect(bx,by,bw,bh);
    }
  }
}

function drawGround(){
  const t=phase===1?transitionProgress:0;
  // Ground body
  const gG=ctx.createLinearGradient(0,GROUND_Y,0,GH);
  if(t>0.4){gG.addColorStop(0,'#14102a');gG.addColorStop(0.4,'#0e0a1c');gG.addColorStop(1,'#060410');}
  else{gG.addColorStop(0,'#0e0c18');gG.addColorStop(0.4,'#0a0812');gG.addColorStop(1,'#06050a');}
  ctx.fillStyle=gG;ctx.fillRect(0,GROUND_Y,GW,GH-GROUND_Y);

  // Surface line
  ctx.save();
  if(t>0.3){
    ctx.strokeStyle=`rgba(232,67,147,${0.4+t*0.3})`;ctx.lineWidth=2;
    ctx.shadowColor='#e84393';ctx.shadowBlur=10;
    ctx.beginPath();ctx.moveTo(0,GROUND_Y);ctx.lineTo(GW,GROUND_Y);ctx.stroke();
    ctx.strokeStyle=`rgba(0,206,201,${0.12+t*0.1})`;ctx.shadowColor='#00cec9';ctx.shadowBlur=5;ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(0,GROUND_Y+2);ctx.lineTo(GW,GROUND_Y+2);ctx.stroke();
  }else{
    ctx.strokeStyle='rgba(80,55,110,0.3)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(0,GROUND_Y);ctx.lineTo(GW,GROUND_Y);ctx.stroke();
  }
  ctx.restore();

  // Subtle horizontal grid
  ctx.strokeStyle=t>0.4?`rgba(140,60,110,0.05)`:`rgba(60,40,80,0.03)`;ctx.lineWidth=0.5;
  for(let i=1;i<=3;i++){const ly=GROUND_Y+i*((GH-GROUND_Y)/3);ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(GW,ly);ctx.stroke();}
}

function drawPlatforms(){
  const t=phase===1?transitionProgress:0;
  for(const p of platforms){
    const sx=p.x-cameraX;if(sx<-100||sx>GW+100)continue;
    ctx.save();
    const hueP=(p.x*0.008)%1>0.5;
    if(t>0.4){ctx.fillStyle=hueP?'#201238':'#102228';ctx.shadowColor=hueP?'rgba(232,67,147,0.2)':'rgba(0,206,201,0.18)';ctx.shadowBlur=4;}
    else{ctx.fillStyle='#181230';}
    rr(ctx,sx,p.y,p.w,p.h,3);ctx.fill();ctx.shadowBlur=0;
    ctx.strokeStyle=t>0.4?(hueP?'rgba(232,67,147,0.4)':'rgba(0,206,201,0.3)'):'rgba(100,70,140,0.25)';
    ctx.lineWidth=1.2;ctx.beginPath();ctx.moveTo(sx+2,p.y);ctx.lineTo(sx+p.w-2,p.y);ctx.stroke();
    ctx.restore();
  }
}

function drawGroundObs(){
  const t=phase===1?transitionProgress:0;
  for(const ob of groundObstacles){
    if(!ob.alive)continue;
    const sx=ob.x-cameraX;if(sx<-50||sx>GW+50)continue;
    ctx.save();
    if(ob.type==='barrier'){
      const bG=ctx.createLinearGradient(sx,ob.y,sx,ob.y+ob.h);
      if(t>0.4){bG.addColorStop(0,'#281540');bG.addColorStop(1,'#180c2a');}
      else{bG.addColorStop(0,'#1c1328');bG.addColorStop(1,'#120c1e');}
      ctx.fillStyle=bG;rr(ctx,sx,ob.y,ob.w,ob.h,3);ctx.fill();
      ctx.strokeStyle=t>0.4?'rgba(232,67,147,0.35)':'rgba(110,70,150,0.28)';ctx.lineWidth=1.2;
      rr(ctx,sx,ob.y,ob.w,ob.h,3);ctx.stroke();
      ctx.strokeStyle=t>0.4?'rgba(232,67,147,0.45)':'rgba(130,90,170,0.35)';ctx.lineWidth=1.2;
      ctx.beginPath();ctx.moveTo(sx+5,ob.y+5);ctx.lineTo(sx+ob.w-5,ob.y+ob.h-5);ctx.stroke();
      ctx.beginPath();ctx.moveTo(sx+ob.w-5,ob.y+5);ctx.lineTo(sx+5,ob.y+ob.h-5);ctx.stroke();
    }else{
      ctx.fillStyle=t>0.4?'#301530':'#221020';
      const sc=Math.floor(ob.w/11);
      for(let s=0;s<sc;s++){
        const sw=ob.w/sc;
        ctx.beginPath();ctx.moveTo(sx+s*sw,GROUND_Y);ctx.lineTo(sx+s*sw+sw/2,ob.y);ctx.lineTo(sx+(s+1)*sw,GROUND_Y);ctx.closePath();ctx.fill();
      }
      if(t>0.4){ctx.fillStyle='rgba(232,67,147,0.35)';for(let s=0;s<sc;s++){const sw=ob.w/sc;ctx.beginPath();ctx.arc(sx+s*sw+sw/2,ob.y+1,1.5,0,Math.PI*2);ctx.fill();}}
      else{ctx.fillStyle='rgba(130,50,90,0.25)';for(let s=0;s<sc;s++){const sw=ob.w/sc;ctx.beginPath();ctx.arc(sx+s*sw+sw/2,ob.y+1,1.2,0,Math.PI*2);ctx.fill();}}
    }
    ctx.restore();
  }
}

function drawWall(){
  const sx=wallX-cameraX;if(sx<-60||sx>GW+60)return;
  const t=phase===1?transitionProgress:0;
  if(!wallBroken){
    const wallW=42;
    const wG=ctx.createLinearGradient(sx,0,sx+wallW,0);
    wG.addColorStop(0,'#16102a');wG.addColorStop(0.5,'#1e1435');wG.addColorStop(1,'#16102a');
    ctx.fillStyle=wG;ctx.fillRect(sx,0,wallW,GROUND_Y);

    // Bricks
    ctx.strokeStyle=t>0.3?'rgba(160,70,130,0.1)':'rgba(70,50,90,0.08)';ctx.lineWidth=0.4;
    const bH=16;
    for(let r=0;r<Math.ceil(GROUND_Y/bH);r++){
      ctx.beginPath();ctx.moveTo(sx,r*bH);ctx.lineTo(sx+wallW,r*bH);ctx.stroke();
      const off=r%2===0?0:wallW/2;
      ctx.beginPath();ctx.moveTo(sx+off,r*bH);ctx.lineTo(sx+off,r*bH+bH);ctx.stroke();
    }

    // Cracks
    ctx.save();
    ctx.strokeStyle=t>0.3?'#e84393':'rgba(160,90,140,0.45)';ctx.lineWidth=1;
    if(t>0.3){ctx.shadowColor='#e84393';ctx.shadowBlur=6;}
    for(let i=0;i<5;i++){
      ctx.beginPath();
      ctx.moveTo(sx+21,60+i*(GROUND_Y*0.16));
      ctx.lineTo(sx+10+Math.sin(i*1.6)*8,80+i*(GROUND_Y*0.16));
      ctx.lineTo(sx+28+Math.cos(i*2)*6,95+i*(GROUND_Y*0.16));
      ctx.stroke();
    }
    ctx.restore();

    // Pulsing border
    const pa=0.2+Math.sin(gameTime*0.05)*0.1;
    ctx.strokeStyle=phase===1?`rgba(232,67,147,${pa})`:`rgba(130,70,150,${pa})`;
    ctx.lineWidth=1.8;ctx.strokeRect(sx,0,wallW,GROUND_Y);

    // Label
    const ly=GROUND_Y*0.45;
    ctx.font='bold 9px "Courier New",monospace';ctx.textAlign='center';
    ctx.fillStyle=phase===1?'#ff7eb3':'rgba(150,110,170,0.55)';
    if(phase===0){ctx.fillText('🔒',sx+21,ly-6);ctx.fillText('COMPLETA',sx+21,ly+7);ctx.fillText('LA BARRA',sx+21,ly+18);}
    else{ctx.fillText('◆ ROMPE ◆',sx+21,ly);ctx.fillText('EL MURO',sx+21,ly+12);}
  }else{
    const elapsed=gameTime-wallBreakTime;
    if(elapsed<50){
      for(let i=0;i<14;i++){
        const fx=sx+20+(Math.random()-0.5)*elapsed*3;
        const fy=50+i*25+elapsed*3;
        const a=1-elapsed/50;
        ctx.fillStyle=`rgba(22,10,38,${a})`;ctx.fillRect(fx,fy,10,13);
      }
    }
  }
}

function drawPlayer(){
  const sx=player.x-cameraX,sy=player.y;
  if(player.invincible>0&&Math.floor(player.invincible/5)%2===0)return;
  ctx.save();
  ctx.translate(sx+player.w/2,sy+player.h/2);ctx.scale(player.facing,1);ctx.translate(-player.w/2,-player.h/2);

  if(phase===1&&transitionProgress>0.5){
    const ga=0.08+Math.sin(gameTime*0.07)*0.03;
    const grd=ctx.createRadialGradient(player.w/2,player.h/2,0,player.w/2,player.h/2,player.w*0.8);
    grd.addColorStop(0,`rgba(232,67,147,${ga})`);grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd;ctx.fillRect(-8,-8,player.w+16,player.h+16);
  }

  // Wings
  const wf=Math.sin(player.wingFrame*Math.PI*0.5)*0.2;
  ctx.save();ctx.translate(player.w*0.35,player.h*0.17);
  for(let i=0;i<6;i++){
    const ang=-0.22-i*0.19+wf,len=16+i*2.8;
    ctx.save();ctx.rotate(ang);
    ctx.fillStyle=`rgba(${226-i*5},${222-i*4},${236-i*2},${0.76-i*0.04})`;
    ctx.beginPath();ctx.ellipse(0,0,len,2.8+i*0.3,0,0,Math.PI*2);ctx.fill();
    if(i%2===0){ctx.strokeStyle=`rgba(255,255,255,${0.1-i*0.01})`;ctx.lineWidth=0.35;ctx.stroke();}
    ctx.restore();
  }
  ctx.restore();

  // Boots
  ctx.fillStyle='#d64f8c';
  rr(ctx,5,player.h-18,8,18,2);ctx.fill();rr(ctx,18,player.h-18,8,18,2);ctx.fill();
  ctx.fillStyle='rgba(255,180,220,0.2)';ctx.fillRect(6,player.h-16,2,12);ctx.fillRect(19,player.h-16,2,12);

  // Skin
  ctx.fillStyle='#c68b6e';ctx.fillRect(8,player.h-23,6,6);ctx.fillRect(19,player.h-23,6,6);

  // Skirt
  ctx.fillStyle='#d64f8c';
  ctx.beginPath();ctx.moveTo(4,player.h-25);ctx.lineTo(28,player.h-25);ctx.lineTo(30,player.h-18);ctx.lineTo(2,player.h-18);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(255,200,230,0.15)';ctx.fillRect(10,player.h-23,1.5,2.5);ctx.fillRect(18,player.h-22,1.5,2);

  // Corset
  const cG=ctx.createLinearGradient(8,player.h-37,25,player.h-37);
  cG.addColorStop(0,'#b83878');cG.addColorStop(0.5,'#d64f8c');cG.addColorStop(1,'#b83878');
  ctx.fillStyle=cG;ctx.fillRect(8,player.h-37,16,13);
  ctx.strokeStyle='rgba(255,200,230,0.2)';ctx.lineWidth=0.4;ctx.beginPath();ctx.moveTo(16,player.h-37);ctx.lineTo(16,player.h-26);ctx.stroke();
  ctx.fillStyle='rgba(255,230,245,0.15)';ctx.beginPath();ctx.moveTo(10,player.h-37);ctx.lineTo(16,player.h-34);ctx.lineTo(22,player.h-37);ctx.closePath();ctx.fill();

  // Gloves
  ctx.fillStyle='#d64f8c';
  if(player.shooting){ctx.fillRect(24,player.h-35,10,3.5);}
  else{ctx.fillRect(2,player.h-33,6,3.5);ctx.fillRect(24,player.h-33,6,3.5);}

  // Head
  ctx.fillStyle='#c68b6e';ctx.beginPath();ctx.arc(16,player.h-42,6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3d2518';ctx.beginPath();ctx.arc(16,player.h-44,5.5,Math.PI*0.95,Math.PI*0.05);ctx.fill();
  ctx.lineWidth=2.4;ctx.strokeStyle='#3d2518';ctx.beginPath();ctx.moveTo(11,player.h-42);ctx.quadraticCurveTo(5,player.h-35,7,player.h-29);ctx.stroke();
  ctx.strokeStyle='#e84393';ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(16,player.h-45,6,Math.PI*1.05,Math.PI*1.95);ctx.stroke();
  ctx.fillStyle='#2a1510';ctx.fillRect(18,player.h-42,1.5,1.2);

  ctx.restore();
}

function drawArrows(){
  const t=phase===1?transitionProgress:0;
  for(const a of arrows){
    const sx=a.x-cameraX;if(sx<-35||sx>GW+35)continue;
    ctx.save();ctx.translate(sx,a.y);if(a.vx<0)ctx.scale(-1,1);
    if(t>0.3){ctx.shadowColor='#e84393';ctx.shadowBlur=6;}
    ctx.strokeStyle='#e84393';ctx.lineWidth=1.8;ctx.beginPath();ctx.moveTo(-12,0);ctx.lineTo(10,0);ctx.stroke();
    ctx.fillStyle='#ff7eb3';ctx.beginPath();ctx.moveTo(10,0);ctx.bezierCurveTo(12,-3,17,-3,15,0);ctx.bezierCurveTo(17,3,12,3,10,0);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.6)';ctx.beginPath();ctx.arc(16,-0.8,1,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#b83878';ctx.beginPath();ctx.moveTo(-12,0);ctx.lineTo(-17,-3);ctx.lineTo(-14,0);ctx.lineTo(-17,3);ctx.closePath();ctx.fill();
    ctx.shadowBlur=0;ctx.restore();
    if(gameTime%3===0)particles.push({x:a.x-a.vx*0.15,y:a.y+(Math.random()-0.5)*2,vx:0,vy:0,life:8,maxLife:8,size:1.2+Math.random(),type:'trail'});
  }
}

function drawHearts(){
  const t=phase===1?transitionProgress:0;
  for(const h of hearts){
    if(!h.alive)continue;const sx=h.x-cameraX;if(sx<-25||sx>GW+25)continue;
    const pulse=1+Math.sin(gameTime*0.05+h.floatOffset)*0.05;const s=h.size*pulse;
    ctx.save();ctx.translate(sx,h.y);
    if(t>0.3){ctx.shadowColor='#e84393';ctx.shadowBlur=7;}
    ctx.fillStyle=t>0.3?'#b83070':'#521835';
    ctx.beginPath();ctx.moveTo(0,s*0.25);ctx.bezierCurveTo(-s*0.5,-s*0.35,-s,s*0.05,0,s*0.85);ctx.bezierCurveTo(s,s*0.05,s*0.5,-s*0.35,0,s*0.25);ctx.fill();
    ctx.fillStyle='rgba(255,180,210,0.16)';ctx.beginPath();ctx.arc(-s*0.14,s*0.04,s*0.14,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.restore();
  }
}

function drawToxic(){
  const t=phase===1?transitionProgress:0;
  for(const tx of toxicTexts){
    if(!tx.alive||!tx.visible)continue;
    const sx=tx.x-cameraX;if(sx<-130||sx>GW+130)continue;
    const alpha=tx.fadeIn*(0.5+Math.sin(gameTime*0.03+tx.offset)*0.1);
    ctx.save();ctx.font='bold 10px "Courier New",monospace';ctx.textAlign='center';
    ctx.fillStyle=t>0.5?`rgba(180,50,80,${alpha*0.75})`:`rgba(100,65,90,${alpha*0.65})`;
    if(t>0.5){ctx.shadowColor='rgba(232,67,147,0.15)';ctx.shadowBlur=3;}
    ctx.fillText(`"${tx.text}"`,sx,tx.y);ctx.shadowBlur=0;ctx.restore();
  }
}

function drawDrops(){
  const t=phase===1?transitionProgress:0;
  for(const d of drops){
    const sx=d.x-cameraX;if(sx<-10||sx>GW+10)continue;
    const glow=0.7+Math.sin(gameTime*0.08+d.x*0.05)*0.18;
    ctx.save();ctx.translate(sx,d.y);
    const col=t>0.5?'#00cec9':'#e84393';ctx.shadowColor=col;ctx.shadowBlur=5;
    ctx.fillStyle=t>0.5?`rgba(0,206,201,${glow})`:`rgba(232,67,147,${glow})`;
    ctx.beginPath();ctx.moveTo(0,-d.size);ctx.quadraticCurveTo(d.size*0.5,-d.size*0.12,0,d.size*0.4);ctx.quadraticCurveTo(-d.size*0.5,-d.size*0.12,0,-d.size);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.28)';ctx.beginPath();ctx.arc(-0.8,-d.size*0.3,1.4,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.restore();
  }
}

function drawParticles(){
  for(const p of particles){
    const sx=p.x-cameraX;if(sx<-6||sx>GW+6)continue;
    const a=p.life/p.maxLife;let c;
    switch(p.type){case'pink':c=`rgba(232,67,147,${a})`;break;case'neon':c=Math.random()>0.5?`rgba(232,67,147,${a})`:`rgba(0,206,201,${a})`;break;case'glow':c=`rgba(255,126,179,${a})`;break;case'damage':c=`rgba(255,50,50,${a})`;break;case'trail':c=`rgba(232,67,147,${a*0.4})`;break;default:c=`rgba(150,110,190,${a})`;}
    ctx.fillStyle=c;ctx.beginPath();ctx.arc(sx,p.y,p.size*a,0,Math.PI*2);ctx.fill();
  }
}

function drawVignette(){
  const t=phase===1?transitionProgress:0;const va=t>0.5?0.1:0.25;
  const vg=ctx.createRadialGradient(GW/2,GH/2,GH*0.4,GW/2,GH/2,GH*0.9);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,`rgba(4,2,8,${va})`);
  ctx.fillStyle=vg;ctx.fillRect(0,0,GW,GH);
}

function lC(h1,h2,t){const[r1,g1,b1]=hR(h1),[r2,g2,b2]=hR(h2);return`rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;}
function hR(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
