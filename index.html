<script>
(function () {
    // Design-ui pages are single compositions, so the whole body is editable.
    function markEditable() {
        document.body.classList.add('artifact-editable');
    }

    // Credit badge with idle-fade. Hover devices only.
    function initChromeUI() {
        if (!matchMedia('(hover: hover)').matches) return;

        var credit = document.createElement('div');
        credit.className = 'design-ui-credit';
        credit.setAttribute('aria-hidden', 'true');
        credit.innerHTML = '\u{1F49C} by ClickUp Brain';
        document.body.appendChild(credit);

        var timer = null;
        var fade = function (out) { credit.style.opacity = out ? '0' : ''; };
        fade(true);
        var show = function () {
            fade(false);
            clearTimeout(timer);
            timer = setTimeout(function () { fade(true); }, 3000);
        };
        document.addEventListener('mousemove', show);
        show();
    }

    function init() {
        markEditable();
        initChromeUI();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();

</script>

<meta charset="UTF-8">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #080510;
  font-family: 'Courier New', monospace;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;

#gameContainer { position: relative; width: 100%; height: 100%; }
canvas { display: block; width: 100%; height: 100%; }

#ui {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 10;
}
#hud {
  position: absolute; top: 14px; left: 14px; right: 14px;
  display: flex; justify-content: space-between; align-items: center; gap: 10px;
}
#progressWrap { display: flex; align-items: center; gap: 8px; }
#progressIcon { font-size: 14px; filter: drop-shadow(0 0 4px rgba(232,67,147,0.5)); }
#progressBar {

#phaseLabel {

  color: #ff7eb3; font-size: clamp(16px,3.5vw,26px); font-weight: bold;
  text-shadow: 0 0 20px rgba(255,100,180,0.5), 0 0 40px rgba(0,200,190,0.25);
  opacity: 0; transition: opacity 0.6s cubic-bezier(0.22,1,0.36,1); text-align: center;
}

.screen-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  pointer-events: all; z-index: 100;
}

#startScreen .subtitle { color: rgba(180,140,200,0.65); font-size: clamp(11px,1.7vw,13px); margin-bottom: 32px; text-align: center; max-width: 360px; padding: 0 24px; line-height: 1.7; }
#startScreen .controls-hint { color: rgba(150,120,180,0.4); font-size: 10px; margin-top: 18px; text-align: center; line-height: 1.6; }

.game-btn {
  padding: 13px 42px; font-size: 14px; font-family: 'Courier New', monospace; font-weight: bold;
  background: linear-gradient(135deg, #d64f8c, #9b4dca); color: #fff;
  border: none; border-radius: 40px; cursor: pointer; letter-spacing: 0.12em;
  transition: transform 0.2s cubic-bezier(0.22,1,0.36,1), box-shadow 0.2s;
  box-shadow: 0 4px 20px rgba(155,77,202,0.35), 0 0 30px rgba(214,79,140,0.15);
}
.game-btn:hover { transform: scale(1.05); }

#gameOverScreen { background: radial-gradient(ellipse at 50% 50%, #1a0510 0%, #060208 70%); display: none; }

#endScreen { background: radial-gradient(ellipse at 50% 40%, #0a2030, #100520 60%, #080510 100%); display: none; }
#endScreen h1 { font-size: clamp(24px,5vw,44px); color: #6ee7c0; text-shadow: 0 0 25px rgba(110,231,192,0.4), 0 0 50px rgba(232,67,147,0.2); margin-bottom: 8px; }
#endScreen p { color: rgba(140,210,190,0.7); font-size: 13px; margin-bottom: 24px; }

#mobileControls {
  position: absolute; bottom: 18px; left: 14px; right: 14px;
  display: flex; justify-content: space-between; align-items: flex-end;
  pointer-events: all; z-index: 20;
}
#dpad { position: relative; width: 130px; height: 130px; }
.dpad-btn {
  position: absolute; width: 44px; height: 44px;
  background: rgba(180,80,140,0.12); border: 1.5px solid rgba(200,100,160,0.3);
  border-radius: 11px; display: flex; align-items: center; justify-content: center;
  color: rgba(230,170,210,0.75); font-size: 16px;
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  transition: background 0.08s, transform 0.08s;
}
.dpad-btn:active { background: rgba(200,80,150,0.3); transform: scale(0.9); }
#dpad-up { top: 0; left: 50%; transform: translateX(-50%); }

#dpad-left { left: 0; top: 50%; transform: translateY(-50%); }
#dpad-right { right: 0; top: 50%; transform: translateY(-50%); }
#dpad-up:active { transform: translateX(-50%) scale(0.9); }
#dpad-down:active { transform: translateX(-50%) scale(0.9); }
#dpad-left:active { transform: translateY(-50%) scale(0.9); }
#dpad-right:active { transform: translateY(-50%) scale(0.9); }

#actionBtns { display: flex; flex-direction: column; gap: 10px; align-items: center; }
.action-btn {
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-family: 'Courier New', monospace; font-weight: bold;
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  transition: transform 0.08s, background 0.08s;
}
.action-btn:active { transform: scale(0.88); }
#shootBtn {
  width: 60px; height: 60px; font-size: 22px;
  background: rgba(214,79,140,0.15); border: 2px solid rgba(214,79,140,0.4);
  color: rgba(255,170,210,0.85); box-shadow: 0 0 12px rgba(214,79,140,0.15);
}
#shootBtn:active { background: rgba(214,79,140,0.4); }
#jumpBtn {
  width: 50px; height: 50px; font-size: 9px; letter-spacing: 0.05em;

}
#jumpBtn:active { background: rgba(120,80,200,0.35); }

@media (min-width: 769px) and (hover: hover) { #mobileControls { display: none; } }
</style>

<div id="gameContainer">
  <canvas id="game"></canvas>
  <div id="ui">
    <div id="hud">
      <div id="progressWrap">
        <span id="progressIcon">💧</span>
        <div id="progressBar"><div id="progressFill"></div></div>
      </div>
      <div id="hearts"></div>
      <div id="score">✦ 0</div>
    </div>
    <div id="phaseLabel"></div>
  </div>
  <div class="screen-overlay" id="startScreen">
    <h1>El Ciclo de Cupido</h1>
    <p class="subtitle">Destruye corazones tóxicos, esquiva recuerdos y recoge gotas de amor propio para resurgir</p>
    <button class="game-btn" id="startBtn">JUGAR</button>

  </div>

      <button class="dpad-btn" id="dpad-right">▶</button>
    </div>

      <button class="action-btn" id="shootBtn">🏹</button>
      <button class="action-btn" id="jumpBtn">SALTO</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W, H;
function resize() { W = window.innerWidth; H = window.innerHeight; canvas.width = W; canvas.height = H; }
resize();
window.addEventListener('resize', resize);

const GRAVITY = 0.6;
const GROUND_RATIO = 0.74;
const DROPS_TO_TRANSITION = 15;
function getGroundY() { return Math.floor(H * GROUND_RATIO); }

const STATE = { MENU:0, PLAYING:1, GAMEOVER:2, WIN:3 };
let gameState = STATE.MENU;
let phase = 0, score = 0, dropsCollected = 0, transitionProgress = 0;
let gameTime = 0, cameraX = 0;
const worldLength = 5000;
const wallX = worldLength - 250;
let wallBroken = false, wallBreakTime = 0, shakeAmount = 0;

const player = {
  x:120, y:0, vy:0, vx:0,
  w:38, h:58, grounded:false, facing:1,
  shooting:false, shootTimer:0,
  speed:3.8, jumpForce:-13,
  frame:0, animTimer:0, wingFrame:0, wingTimer:0,
  invincible:0, hp:3, maxHp:3
};

let arrows=[], hearts=[], toxicTexts=[], particles=[], drops=[], platforms=[], groundObstacles=[], bgStars=[];

const toxicPhrases = ["ya no te quiero","fue tu culpa","no vales nada","nunca cambiarás","no eres suficiente","te olvidé","solo fue un juego","me aburriste"];

function generateStars() {
  bgStars = [];
  for (let i = 0; i < 80; i++) {
    bgStars.push({ x: Math.random()*W*3, y: Math.random()*H*0.6, size: 0.5+Math.random()*1.1, ts: 0.02+Math.random()*0.03, to: Math.random()*Math.PI*2 });
  }
}
generateStars();

function renderHearts() {
  const c = document.getElementById('hearts');
  c.innerHTML = '';
  for (let i = 0; i < player.maxHp; i++) {
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','0 0 24 24');
    svg.classList.add('heart-icon');
    if (i >= player.hp) svg.classList.add('empty');
    svg.innerHTML = `<path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="${i<player.hp?'#e84393':'#2a1020'}"/>`;
    c.appendChild(svg);
  }
}

function generateWorld() {
  platforms=[]; hearts=[]; toxicTexts=[]; drops=[]; arrows=[]; particles=[]; groundObstacles=[];
  const gy = getGroundY();

  // PLATFORMS at varying heights (low, mid, high) in staircase clusters
  let px = 220;
  for (let i = 0; i < 55; i++) {
    const cluster = i % 5;
    let py;
    if (cluster === 0) py = gy - 65 - Math.random()*20; // low
    else if (cluster === 1) py = gy - 110 - Math.random()*20; // mid (reachable from ground)
    else if (cluster === 2) py = gy - 155 - Math.random()*15; // high (reachable from mid platform)
    else if (cluster === 3) py = gy - 100 - Math.random()*25; // mid
    else py = gy - 60 - Math.random()*20; // low

    const pw = 75 + Math.random()*80;
    platforms.push({ x: px, y: py, w: pw, h: 12 });
    px += 120 + Math.random()*100;
  }

  // GROUND-LEVEL OBSTACLES: barriers you must jump over or destroy
  let ox = 350;
  for (let i = 0; i < 18; i++) {
    const type = Math.random() > 0.5 ? 'spikes' : 'barrier';
    groundObstacles.push({
      x: ox,
      y: gy - (type === 'barrier' ? 45 : 20),
      w: type === 'barrier' ? 35 : 50,
      h: type === 'barrier' ? 45 : 20,
      type: type,
      alive: true,
      hp: type === 'barrier' ? 2 : 0 // barriers can be destroyed, spikes must be jumped
    });
    ox += 250 + Math.random()*200;
  }

  // HEARTS floating at varied heights
  for (let i = 0; i < 20; i++) {
    const hx = 280 + (i/20)*(worldLength - 500);
    const hy = gy - 90 - Math.random()*150;
    hearts.push({
      x: hx, y: hy, baseY: hy,
      size: 16+Math.random()*8,
      hp: 2, alive: true,
      floatOffset: Math.random()*Math.PI*2
    });
  }

  // TOXIC TEXTS floating (with timed despawn)
  for (let i = 0; i < 12; i++) {
    const tx = 400 + (i/12)*(worldLength - 600);
    const ty = gy - 90 - Math.random()*140;
    toxicTexts.push({
      x: tx, y: ty, baseX: tx, baseY: ty,
      text: toxicPhrases[Math.floor(Math.random()*toxicPhrases.length)],
      speed: 0.3+Math.random()*0.5,
      amplitude: 20+Math.random()*25,
      offset: Math.random()*Math.PI*2,
      alive: true, lifetime: 280+Math.random()*180,
      spawnTime: 0, visible: false, fadeIn: 0
    });
  }
}

// Input
const keys = {};
let touchState = { left:false, right:false, up:false, shoot:false };
window.addEventListener('keydown', e => { keys[e.code]=true; if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.code]=false; });

function setupMobile() {
  const map = {'dpad-up':'up','dpad-left':'left','dpad-right':'right','dpad-down':'down','shootBtn':'shoot','jumpBtn':'up'};
  Object.entries(map).forEach(([id,dir]) => {
    const el = document.getElementById(id); if(!el) return;
    el.addEventListener('touchstart', e=>{e.preventDefault();touchState[dir]=true;},{passive:false});
    el.addEventListener('touchend', e=>{e.preventDefault();touchState[dir]=false;},{passive:false});
    el.addEventListener('touchcancel', ()=>{touchState[dir]=false;});
  });
}
setupMobile();

function inputLeft(){return keys['ArrowLeft']||keys['KeyA']||touchState.left;}
function inputRight(){return keys['ArrowRight']||keys['KeyD']||touchState.right;}
function inputUp(){return keys['ArrowUp']||keys['KeyW']||keys['Space']||touchState.up;}
function inputShoot(){return keys['KeyX']||keys['KeyZ']||keys['Enter']||touchState.shoot;}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('retryBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);

function startGame() {
  document.getElementById('startScreen').style.display='none';
  document.getElementById('gameOverScreen').style.display='none';
  document.getElementById('endScreen').style.display='none';
  gameState=STATE.PLAYING; phase=0; score=0; dropsCollected=0;
  transitionProgress=0; gameTime=0; cameraX=0;
  wallBroken=false; wallBreakTime=0; shakeAmount=0;
  player.x=120; player.y=getGroundY()-player.h;
  player.vy=0; player.vx=0; player.hp=3; player.invincible=0; player.facing=1;
  generateWorld(); renderHearts(); updateHUD();
}

function gameOver() {
  gameState=STATE.GAMEOVER;
  document.getElementById('goScore').textContent=`Puntos: ${score}`;
  document.getElementById('gameOverScreen').style.display='flex';
}
function winGame() {
  gameState=STATE.WIN;
  document.getElementById('endScreen').style.display='flex';
}

function updateHUD() {
  document.getElementById('score').textContent=`✦ ${score}`;
  const pct = Math.min(100,(dropsCollected/DROPS_TO_TRANSITION)*100);
  document.getElementById('progressFill').style.width = pct+'%';
  if(phase===1){
    document.getElementById('progressFill').style.background='linear-gradient(90deg,#00cec9,#ff7eb3)';
    document.getElementById('progressIcon').textContent='✦';
  }
}
function showPhaseLabel(text) {
  const el=document.getElementById('phaseLabel');
  el.textContent=text; el.style.opacity=1;
  setTimeout(()=>{el.style.opacity=0;},2800);
}

function shootArrow() {
  if(player.shootTimer>0) return;
  player.shootTimer = phase===1 ? 12 : 18;
  player.shooting=true;
  setTimeout(()=>{player.shooting=false;},150);
  arrows.push({
    x: player.x+(player.facing>0?player.w:0),
    y: player.y+player.h*0.35,
    vx: player.facing*(phase===1?14:10),
    vy:0, life:80, power: phase===1?2:1
  });
}

function spawnParticles(x,y,count,type,spread) {
  for(let i=0;i<count;i++){
    particles.push({x,y,vx:(Math.random()-0.5)*spread,vy:(Math.random()-0.8)*spread,life:20+Math.random()*22,maxLife:42,size:2+Math.random()*3.2,type});
  }
}
function spawnDrop(x,y) {
  drops.push({x,y,vy:-2.5-Math.random()*2,vx:(Math.random()-0.5)*2,life:220,size:8,collected:false});
}

// UPDATE
function update() {
  if(gameState!==STATE.PLAYING) return;
  gameTime++;
  const gy = getGroundY();
  const speed = phase===1 ? player.speed*1.4 : player.speed;

  if(inputLeft()){player.vx=-speed;player.facing=-1;}
  else if(inputRight()){player.vx=speed;player.facing=1;}
  else{player.vx*=0.76;}

  if(inputUp()&&player.grounded){
    player.vy=player.jumpForce*(phase===1?1.15:1);
    player.grounded=false;
  }
  if(inputShoot()) shootArrow();
  if(player.shootTimer>0) player.shootTimer--;

  player.vy+=GRAVITY;
  player.x+=player.vx;
  player.y+=player.vy;

  // Ground
  if(player.y+player.h>=gy){player.y=gy-player.h;player.vy=0;player.grounded=true;}
  else{player.grounded=false;}

  // Platforms
  for(const p of platforms){
    if(player.vy>0 && player.x+player.w>p.x && player.x<p.x+p.w &&
       player.y+player.h>=p.y && player.y+player.h<=p.y+p.h+player.vy+8){
      player.y=p.y-player.h; player.vy=0; player.grounded=true;
    }
  }

  // WALL: blocks player until phase 1
  if(!wallBroken){
    if(phase===0 && player.x+player.w > wallX){
      player.x = wallX - player.w; // can't pass
      player.vx = 0;
    }
    if(phase===1 && player.x+player.w > wallX){
      wallBroken=true; wallBreakTime=gameTime;
      shakeAmount=14;
      spawnParticles(wallX,gy-100,28,'neon',14);
      showPhaseLabel('✦ ¡LIBRE! ✦');
      setTimeout(winGame,2200);
    }
  }

  // Ground obstacles collision
  for(const ob of groundObstacles){
    if(!ob.alive) continue;
    // Check player collision
    if(player.x+player.w > ob.x && player.x < ob.x+ob.w &&
       player.y+player.h > ob.y && player.y < ob.y+ob.h){
      if(ob.type==='spikes'){
        // Damage and push back
        if(player.invincible<=0){
          player.hp--; player.invincible=70; shakeAmount=5;
          player.vx = -player.facing*5; player.vy=-5;
          spawnParticles(player.x+player.w/2,player.y+player.h/2,5,'damage',4);
          renderHearts();
          if(player.hp<=0){gameOver();return;}
        }
      } else if(ob.type==='barrier'){
        // Block movement
        if(player.vx>0) { player.x=ob.x-player.w; player.vx=0; }
        else if(player.vx<0) { player.x=ob.x+ob.w; player.vx=0; }
      }
    }
  }

  // Bounds
  if(player.x<20) player.x=20;
  if(player.x>worldLength-40) player.x=worldLength-40;

  // Camera
  const targetCam=player.x-W*0.3;
  cameraX+=(targetCam-cameraX)*0.07;
  if(cameraX<0) cameraX=0;

  // Arrows
  for(let i=arrows.length-1;i>=0;i--){
    const a=arrows[i]; a.x+=a.vx; a.life--;
    if(a.life<=0){arrows.splice(i,1);continue;}
    let removed=false;
    // vs hearts
    for(const h of hearts){
      if(!h.alive) continue;
      if(Math.abs(a.x-h.x)<h.size+8 && Math.abs(a.y-h.y)<h.size+8){
        h.hp-=a.power;
        if(h.hp<=0){h.alive=false;score+=10;spawnParticles(h.x,h.y,10,phase===1?'neon':'pink',7);spawnDrop(h.x,h.y);if(Math.random()>0.5)spawnDrop(h.x+10,h.y-6);shakeAmount=4;}
        else{spawnParticles(h.x,h.y,4,'pink',4);shakeAmount=2;}
        arrows.splice(i,1);removed=true;break;
      }
    }
    if(removed) continue;
    // vs ground obstacles (barriers)
    for(const ob of groundObstacles){
      if(!ob.alive||ob.type!=='barrier') continue;
      if(a.x>ob.x&&a.x<ob.x+ob.w&&a.y>ob.y&&a.y<ob.y+ob.h){
        ob.hp-=a.power;
        if(ob.hp<=0){ob.alive=false;score+=5;spawnParticles(ob.x+ob.w/2,ob.y+ob.h/2,8,phase===1?'neon':'pink',6);shakeAmount=3;}
        else{spawnParticles(ob.x+ob.w/2,ob.y+ob.h/2,3,'pink',3);}
        arrows.splice(i,1);removed=true;break;
      }
    }
    if(removed) continue;
    // vs toxic in neon
    if(phase===1){
      for(const t of toxicTexts){
        if(!t.alive||!t.visible) continue;
        if(Math.abs(a.x-t.x)<50&&Math.abs(a.y-t.y)<16){
          t.alive=false;score+=5;spawnParticles(t.x,t.y,6,'neon',5);
          arrows.splice(i,1);break;
        }
      }
    }
  }

  // Hearts float
  for(const h of hearts){if(!h.alive)continue; h.y=h.baseY+Math.sin(gameTime*0.022+h.floatOffset)*10;}

  // Toxic texts
  for(const t of toxicTexts){
    if(!t.alive)continue;
    const dist=Math.abs(player.x-t.baseX);
    if(!t.visible&&dist<450){t.visible=true;t.spawnTime=gameTime;t.fadeIn=0;}
    if(!t.visible)continue;
    if(t.fadeIn<1)t.fadeIn=Math.min(1,t.fadeIn+0.03);
    const age=gameTime-t.spawnTime;
    if(age>t.lifetime){t.fadeIn-=0.04;if(t.fadeIn<=0){t.alive=false;continue;}}
    t.x=t.baseX+Math.sin(gameTime*0.012+t.offset)*t.amplitude;
    t.y=t.baseY+Math.cos(gameTime*0.01+t.offset)*10;
    if(player.invincible<=0&&t.fadeIn>0.5){
      const dx=player.x+player.w/2-t.x,dy=player.y+player.h/2-t.y;
      if(Math.abs(dx)<40&&Math.abs(dy)<18){
        player.hp--;player.invincible=70;shakeAmount=6;
        spawnParticles(player.x+player.w/2,player.y+player.h/2,5,'damage',5);
        renderHearts();
        if(player.hp<=0){gameOver();return;}
      }
    }
  }

  if(player.invincible>0) player.invincible--;

  // Drops
  for(let i=drops.length-1;i>=0;i--){
    const d=drops[i]; d.vy+=0.22;d.x+=d.vx;d.y+=d.vy;d.life--;
    if(d.y>gy-6){d.y=gy-6;d.vy=0;d.vx=0;}
    const dx=player.x+player.w/2-d.x,dy=player.y+player.h/2-d.y;
    if(Math.sqrt(dx*dx+dy*dy)<36&&!d.collected){
      d.collected=true;dropsCollected++;score+=5;
      spawnParticles(d.x,d.y,5,phase===1?'neon':'glow',4);
      drops.splice(i,1);
      if(dropsCollected>=DROPS_TO_TRANSITION&&phase===0){
        phase=1;transitionProgress=0;
        showPhaseLabel('✦ RESURGIMIENTO ✦');
        spawnParticles(player.x,player.y,22,'neon',10);shakeAmount=8;
      }
      updateHUD();continue;
    }
    if(d.life<=0)drops.splice(i,1);
  }

  if(phase===1&&transitionProgress<1) transitionProgress+=0.005;

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.06;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }

  if(shakeAmount>0)shakeAmount*=0.83;

  player.animTimer++;
  if(player.animTimer>7){player.animTimer=0;player.frame=(player.frame+1)%4;}
  player.wingTimer++;
  if(player.wingTimer>5){player.wingTimer=0;player.wingFrame=(player.wingFrame+1)%4;}
  updateHUD();
}

// DRAW
function draw() {
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(shakeAmount>0.5) ctx.translate((Math.random()-0.5)*shakeAmount,(Math.random()-0.5)*shakeAmount);
  drawSky(); drawMoon(); drawStars(); drawBgCity(); drawGround();
  drawPlatforms(); drawGroundObstacles(); drawWall();
  drawDrops(); drawHearts(); drawToxicTexts();
  drawArrows(); drawPlayer(); drawParticles(); drawVignette();
  ctx.restore();
}

function drawSky(){
  const t=phase===1?transitionProgress:0;
  const gy=getGroundY();
  const grad=ctx.createLinearGradient(0,0,0,gy);
  if(t<0.5){grad.addColorStop(0,'#050310');grad.addColorStop(0.4,'#0a0618');grad.addColorStop(0.8,'#120d20');grad.addColorStop(1,'#181225');}
  else{const m=(t-0.5)*2;grad.addColorStop(0,lC('#050310','#060a16',m));grad.addColorStop(0.4,lC('#0a0618','#081020',m));grad.addColorStop(1,lC('#181225','#141830',m));}
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,gy);
}

function drawMoon(){
  const t=phase===1?transitionProgress:0;
  const mx=W*0.78-cameraX*0.015,my=H*0.11,r=28;
  const grd=ctx.createRadialGradient(mx,my,0,mx,my,r*3);
  grd.addColorStop(0,t>0.5?'rgba(232,67,147,0.07)':'rgba(200,180,220,0.05)');
  grd.addColorStop(1,'transparent');
  ctx.fillStyle=grd;ctx.fillRect(mx-r*3,my-r*3,r*6,r*6);
  ctx.fillStyle=t>0.5?'rgba(230,170,210,0.12)':'rgba(200,190,220,0.1)';
  ctx.beginPath();ctx.arc(mx,my,r,0,Math.PI*2);ctx.fill();
}

function drawStars(){
  const t=phase===1?transitionProgress:0;
  const px=cameraX*0.04;
  for(const s of bgStars){
    const sx=(s.x-px)%(W+80);if(sx<-3||sx>W+3)continue;
    const tw=0.3+Math.sin(gameTime*s.ts+s.to)*0.25;
    ctx.fillStyle=t>0.5?(s.to>3?`rgba(232,130,180,${tw*0.5})`:`rgba(130,200,220,${tw*0.5})`):`rgba(200,190,230,${tw*0.45})`;
    ctx.beginPath();ctx.arc(sx,s.y,s.size,0,Math.PI*2);ctx.fill();
  }
}

function drawBgCity(){
  const t=phase===1?transitionProgress:0;
  const gy=getGroundY(),px=cameraX*0.12;
  for(let i=0;i<28;i++){
    const bx=i*190+40-(px%(190*28));if(bx<-100||bx>W+100)continue;
    const bh=30+(i*43%90),bw=30+(i*27%40),by=gy-bh;
    if(t>0.3){
      ctx.fillStyle='#0c081a';ctx.fillRect(bx,by,bw,bh);
      const rows=Math.floor(bh/13);
      for(let r=0;r<rows;r++){for(let c=0;c<2;c++){
        if((i+r+c)%4!==0)continue;
        ctx.fillStyle=(i+r)%3===0?`rgba(232,67,147,${0.2+t*0.2})`:`rgba(0,206,201,${0.15+t*0.15})`;
        ctx.fillRect(bx+3+c*(bw/2),by+3+r*13,bw/2-5,6);
      }}
    }else{
      ctx.fillStyle=`rgba(10,7,18,${0.5+(i%3)*0.12})`;ctx.fillRect(bx,by,bw,bh);
    }
  }
}

function drawGround(){
  const t=phase===1?transitionProgress:0;
  const gy=getGroundY();
  // Ground body
  const gG=ctx.createLinearGradient(0,gy,0,H);
  if(t>0.4){gG.addColorStop(0,'#16102a');gG.addColorStop(0.3,'#100c1e');gG.addColorStop(1,'#060410');}
  else{gG.addColorStop(0,'#10101c');gG.addColorStop(0.4,'#0c0a14');gG.addColorStop(1,'#06050c');}
  ctx.fillStyle=gG;ctx.fillRect(0,gy,W,H-gy);

  // Surface line
  ctx.save();
  if(t>0.3){
    ctx.strokeStyle=`rgba(232,67,147,${0.4+t*0.3})`;ctx.lineWidth=2.5;
    ctx.shadowColor='#e84393';ctx.shadowBlur=12;
    ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();
    ctx.strokeStyle=`rgba(0,206,201,${0.15+t*0.12})`;ctx.shadowColor='#00cec9';ctx.shadowBlur=6;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,gy+3);ctx.lineTo(W,gy+3);ctx.stroke();
  }else{
    ctx.strokeStyle='rgba(90,60,120,0.35)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();
  }
  ctx.restore();

  // Grid
  ctx.save();
  const ga=t>0.4?0.06+t*0.03:0.025;
  ctx.strokeStyle=t>0.4?`rgba(160,70,130,${ga})`:`rgba(70,50,90,${ga})`;ctx.lineWidth=0.5;
  for(let i=1;i<=4;i++){const ly=gy+i*((H-gy)/4);ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(W,ly);ctx.stroke();}
  if(t>0.4){const sp=90;const off=(cameraX*0.3)%sp;for(let x=-off;x<W+sp;x+=sp){ctx.beginPath();ctx.moveTo(x,gy+2);ctx.lineTo(x,H);ctx.stroke();}}
  ctx.restore();
}

function drawPlatforms(){
  const t=phase===1?transitionProgress:0;
  for(const p of platforms){
    const sx=p.x-cameraX;if(sx<-120||sx>W+120)continue;
    ctx.save();
    const hueShift=(p.x*0.008)%1>0.5;
    if(t>0.4){
      ctx.fillStyle=hueShift?'#22133a':'#132530';
      ctx.shadowColor=hueShift?'rgba(232,67,147,0.25)':'rgba(0,206,201,0.2)';ctx.shadowBlur=5;
    }else{ctx.fillStyle='#1a1430';}
    rr(ctx,sx,p.y,p.w,p.h,4);ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle=t>0.4?(hueShift?'rgba(232,67,147,0.45)':'rgba(0,206,201,0.35)'):'rgba(110,80,150,0.28)';
    ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(sx+3,p.y);ctx.lineTo(sx+p.w-3,p.y);ctx.stroke();
    ctx.restore();
  }
}

function drawGroundObstacles(){
  const t=phase===1?transitionProgress:0;
  const gy=getGroundY();
  for(const ob of groundObstacles){
    if(!ob.alive) continue;
    const sx=ob.x-cameraX;
    if(sx<-60||sx>W+60) continue;

    ctx.save();
    if(ob.type==='barrier'){
      // Destructible barrier: purple/dark block with cracks
      const bGrad=ctx.createLinearGradient(sx,ob.y,sx,ob.y+ob.h);
      if(t>0.4){bGrad.addColorStop(0,'#2a1545');bGrad.addColorStop(1,'#1a0c30');}
      else{bGrad.addColorStop(0,'#1e1530');bGrad.addColorStop(1,'#140e22');}
      ctx.fillStyle=bGrad;
      rr(ctx,sx,ob.y,ob.w,ob.h,3);ctx.fill();
      // Edge glow
      ctx.strokeStyle=t>0.4?'rgba(232,67,147,0.4)':'rgba(120,80,160,0.3)';
      ctx.lineWidth=1.5;
      rr(ctx,sx,ob.y,ob.w,ob.h,3);ctx.stroke();
      // X mark
      ctx.strokeStyle=t>0.4?'rgba(232,67,147,0.5)':'rgba(140,100,180,0.4)';
      ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(sx+6,ob.y+6);ctx.lineTo(sx+ob.w-6,ob.y+ob.h-6);ctx.stroke();
      ctx.beginPath();ctx.moveTo(sx+ob.w-6,ob.y+6);ctx.lineTo(sx+6,ob.y+ob.h-6);ctx.stroke();
    }else{
      // Spikes: triangular shapes on ground
      ctx.fillStyle=t>0.4?'#3a1535':'#281020';
      const spikeCount=4;
      const sw=ob.w/spikeCount;
      for(let s=0;s<spikeCount;s++){
        ctx.beginPath();
        ctx.moveTo(sx+s*sw,gy);
        ctx.lineTo(sx+s*sw+sw/2,ob.y);
        ctx.lineTo(sx+(s+1)*sw,gy);
        ctx.closePath();ctx.fill();
      }
      // Glow tips
      if(t>0.4){
        ctx.fillStyle='rgba(232,67,147,0.4)';
        for(let s=0;s<spikeCount;s++){
          ctx.beginPath();ctx.arc(sx+s*sw+sw/2,ob.y+2,2,0,Math.PI*2);ctx.fill();
        }
      }else{
        ctx.fillStyle='rgba(140,60,100,0.3)';
        for(let s=0;s<spikeCount;s++){
          ctx.beginPath();ctx.arc(sx+s*sw+sw/2,ob.y+2,1.5,0,Math.PI*2);ctx.fill();
        }
      }
    }
    ctx.restore();
  }
}

function drawWall(){
  // ALWAYS visible
  const sx=wallX-cameraX;
  if(sx<-80||sx>W+80) return;
  const gy=getGroundY();
  const t=phase===1?transitionProgress:0;

  if(!wallBroken){
    const wallH=gy; // full height wall
    const wy=0;
    const wallW=50;

    // Wall body
    const wG=ctx.createLinearGradient(sx,0,sx+wallW,0);
    wG.addColorStop(0,'#18102a');wG.addColorStop(0.5,'#201438');wG.addColorStop(1,'#18102a');
    ctx.fillStyle=wG;
    ctx.fillRect(sx,wy,wallW,wallH);

    // Bricks pattern
    ctx.strokeStyle=t>0.3?'rgba(180,80,140,0.12)':'rgba(80,60,100,0.1)';
    ctx.lineWidth=0.5;
    const brickH=20;
    for(let r=0;r<Math.ceil(wallH/brickH);r++){
      const by2=r*brickH;
      ctx.beginPath();ctx.moveTo(sx,by2);ctx.lineTo(sx+wallW,by2);ctx.stroke();
      const offset=r%2===0?0:wallW/2;
      ctx.beginPath();ctx.moveTo(sx+offset,by2);ctx.lineTo(sx+offset,by2+brickH);ctx.stroke();
    }

    // Cracks glow
    ctx.save();
    const crackColor=t>0.3?'#e84393':'rgba(180,100,160,0.5)';
    ctx.strokeStyle=crackColor;ctx.lineWidth=1.2;
    if(t>0.3){ctx.shadowColor='#e84393';ctx.shadowBlur=8;}
    for(let i=0;i<6;i++){
      ctx.beginPath();
      ctx.moveTo(sx+25,gy*0.15+i*(gy*0.12));
      ctx.lineTo(sx+12+Math.sin(i*1.8)*10,gy*0.15+i*(gy*0.12)+20);
      ctx.lineTo(sx+30+Math.cos(i*2.1)*7,gy*0.15+i*(gy*0.12)+35);
      ctx.stroke();
    }
    ctx.restore();

    // Pulsing border
    const pulseA=0.25+Math.sin(gameTime*0.05)*0.12;
    ctx.strokeStyle=phase===1?`rgba(232,67,147,${pulseA})`:`rgba(140,80,160,${pulseA})`;
    ctx.lineWidth=2;ctx.strokeRect(sx,wy,wallW,wallH);

    // Lock / label
    const labelY=gy*0.45;
    ctx.font='bold 10px "Courier New",monospace';
    ctx.textAlign='center';
    ctx.fillStyle=phase===1?'#ff7eb3':'rgba(160,120,180,0.6)';
    if(phase===0){
      ctx.fillText('🔒',sx+25,labelY-8);
      ctx.fillText('COMPLETA',sx+25,labelY+8);
      ctx.fillText('LA BARRA',sx+25,labelY+20);
    }else{
      ctx.fillText('◆ ROMPE ◆',sx+25,labelY);
      ctx.fillText('EL MURO',sx+25,labelY+14);
    }
  }else{
    // Broken
    const elapsed=gameTime-wallBreakTime;
    if(elapsed<55){
      for(let i=0;i<15;i++){
        const fx=sx+25+(Math.random()-0.5)*elapsed*3.5;
        const fy=gy*0.2+i*(gy*0.05)+elapsed*3;
        const alpha=1-elapsed/55;
        ctx.fillStyle=`rgba(26,12,40,${alpha})`;
        ctx.fillRect(fx,fy,12,16);
      }
    }
  }
}

function drawPlayer(){
  const sx=player.x-cameraX,sy=player.y;
  if(player.invincible>0&&Math.floor(player.invincible/5)%2===0) return;
  ctx.save();
  ctx.translate(sx+player.w/2,sy+player.h/2);
  ctx.scale(player.facing,1);
  ctx.translate(-player.w/2,-player.h/2);

  // Aura
  if(phase===1&&transitionProgress>0.5){
    const ga=0.1+Math.sin(gameTime*0.07)*0.04;
    const grd=ctx.createRadialGradient(player.w/2,player.h/2,0,player.w/2,player.h/2,player.w);
    grd.addColorStop(0,`rgba(232,67,147,${ga})`);grd.addColorStop(1,'transparent');
    ctx.fillStyle=grd;ctx.fillRect(-10,-10,player.w+20,player.h+20);
  }

  // Wings
  const wf=Math.sin(player.wingFrame*Math.PI*0.5)*0.2;
  ctx.save();ctx.translate(player.w*0.35,player.h*0.18);
  for(let i=0;i<7;i++){
    const ang=-0.25-i*0.2+wf,len=18+i*3.2;
    ctx.save();ctx.rotate(ang);
    ctx.fillStyle=`rgba(${228-i*5},${224-i*4},${238-i*2},${0.78-i*0.04})`;
    ctx.beginPath();ctx.ellipse(0,0,len,3.2+i*0.35,0,0,Math.PI*2);ctx.fill();
    if(i%2===0){ctx.strokeStyle=`rgba(255,255,255,${0.12-i*0.01})`;ctx.lineWidth=0.4;ctx.stroke();}
    ctx.restore();
  }
  ctx.restore();

  // Boots
  ctx.fillStyle='#d64f8c';
  rr(ctx,6,player.h-21,9,21,2);ctx.fill();
  rr(ctx,20,player.h-21,9,21,2);ctx.fill();
  ctx.fillStyle='rgba(255,180,220,0.22)';ctx.fillRect(7,player.h-19,2.5,13);ctx.fillRect(21,player.h-19,2.5,13);

  // Skin
  ctx.fillStyle='#c68b6e';ctx.fillRect(9,player.h-27,7,7);ctx.fillRect(22,player.h-27,7,7);

  // Skirt
  ctx.fillStyle='#d64f8c';
  ctx.beginPath();ctx.moveTo(5,player.h-29);ctx.lineTo(32,player.h-29);ctx.lineTo(34,player.h-21);ctx.lineTo(3,player.h-21);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(255,200,230,0.18)';ctx.fillRect(12,player.h-27,2,3);ctx.fillRect(20,player.h-25,2,3);ctx.fillRect(26,player.h-27,1.5,2);

  // Corset
  const cG=ctx.createLinearGradient(10,player.h-43,28,player.h-43);
  cG.addColorStop(0,'#b83878');cG.addColorStop(0.5,'#d64f8c');cG.addColorStop(1,'#b83878');
  ctx.fillStyle=cG;ctx.fillRect(10,player.h-43,18,15);
  ctx.strokeStyle='rgba(255,200,230,0.25)';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(19,player.h-43);ctx.lineTo(19,player.h-30);ctx.stroke();
  ctx.fillStyle='rgba(255,230,245,0.18)';
  ctx.beginPath();ctx.moveTo(12,player.h-43);ctx.lineTo(19,player.h-39);ctx.lineTo(26,player.h-43);ctx.closePath();ctx.fill();

  // Gloves
  ctx.fillStyle='#d64f8c';
  if(player.shooting){ctx.fillRect(28,player.h-41,11,4);}
  else{ctx.fillRect(3,player.h-39,7,4);ctx.fillRect(28,player.h-39,7,4);}

  // Head
  ctx.fillStyle='#c68b6e';ctx.beginPath();ctx.arc(19,player.h-49,7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3d2518';ctx.beginPath();ctx.arc(19,player.h-51,6.5,Math.PI*0.95,Math.PI*0.05);ctx.fill();
  ctx.lineWidth=2.8;ctx.strokeStyle='#3d2518';ctx.beginPath();ctx.moveTo(12,player.h-49);ctx.quadraticCurveTo(5,player.h-41,8,player.h-34);ctx.stroke();
  ctx.strokeStyle='#e84393';ctx.lineWidth=1.4;ctx.beginPath();ctx.arc(19,player.h-52,7,Math.PI*1.05,Math.PI*1.95);ctx.stroke();
  ctx.fillStyle='#2a1510';ctx.fillRect(21,player.h-49,1.8,1.3);

  ctx.restore();
}

function drawArrows(){
  const t=phase===1?transitionProgress:0;
  for(const a of arrows){
    const sx=a.x-cameraX;if(sx<-40||sx>W+40)continue;
    ctx.save();ctx.translate(sx,a.y);if(a.vx<0)ctx.scale(-1,1);
    if(t>0.3){ctx.shadowColor='#e84393';ctx.shadowBlur=7;}
    const sG=ctx.createLinearGradient(-14,0,16,0);sG.addColorStop(0,'rgba(214,79,140,0.4)');sG.addColorStop(1,'#e84393');
    ctx.strokeStyle=sG;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-14,0);ctx.lineTo(12,0);ctx.stroke();
    ctx.fillStyle='#ff7eb3';ctx.beginPath();ctx.moveTo(12,0);ctx.bezierCurveTo(14,-3.5,19,-3.5,17,0);ctx.bezierCurveTo(19,3.5,14,3.5,12,0);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.65)';ctx.beginPath();ctx.arc(18,-1,1.1,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#b83878';ctx.beginPath();ctx.moveTo(-14,0);ctx.lineTo(-20,-3.5);ctx.lineTo(-17,0);ctx.lineTo(-20,3.5);ctx.closePath();ctx.fill();
    ctx.shadowBlur=0;ctx.restore();
    if(gameTime%3===0)particles.push({x:a.x-a.vx*0.2,y:a.y+(Math.random()-0.5)*2,vx:0,vy:0,life:10,maxLife:10,size:1.5+Math.random(),type:'trail'});
  }
}

function drawHearts(){
  const t=phase===1?transitionProgress:0;
  for(const h of hearts){
    if(!h.alive)continue;const sx=h.x-cameraX;if(sx<-30||sx>W+30)continue;
    const pulse=1+Math.sin(gameTime*0.05+h.floatOffset)*0.06;const s=h.size*pulse;
    ctx.save();ctx.translate(sx,h.y);
    if(t>0.3){ctx.shadowColor='#e84393';ctx.shadowBlur=9;}
    ctx.fillStyle=t>0.3?'#b83070':'#5a1835';
    ctx.beginPath();ctx.moveTo(0,s*0.25);ctx.bezierCurveTo(-s*0.5,-s*0.35,-s,s*0.05,0,s*0.85);ctx.bezierCurveTo(s,s*0.05,s*0.5,-s*0.35,0,s*0.25);ctx.fill();
    ctx.fillStyle='rgba(255,180,210,0.18)';ctx.beginPath();ctx.arc(-s*0.16,s*0.05,s*0.16,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.restore();
  }
}

function drawToxicTexts(){
  const t=phase===1?transitionProgress:0;
  for(const tx of toxicTexts){
    if(!tx.alive||!tx.visible)continue;
    const sx=tx.x-cameraX;if(sx<-150||sx>W+150)continue;
    const alpha=tx.fadeIn*(0.5+Math.sin(gameTime*0.035+tx.offset)*0.12);
    ctx.save();ctx.font='bold 12px "Courier New",monospace';ctx.textAlign='center';
    ctx.fillStyle=t>0.5?`rgba(180,50,80,${alpha*0.8})`:`rgba(110,70,100,${alpha*0.7})`;
    if(t>0.5){ctx.shadowColor='rgba(232,67,147,0.2)';ctx.shadowBlur=3;}
    ctx.fillText(`"${tx.text}"`,sx,tx.y);ctx.shadowBlur=0;ctx.restore();
  }
}

function drawDrops(){
  const t=phase===1?transitionProgress:0;
  for(const d of drops){
    const sx=d.x-cameraX;if(sx<-12||sx>W+12)continue;
    const glow=0.7+Math.sin(gameTime*0.08+d.x*0.05)*0.2;
    ctx.save();ctx.translate(sx,d.y);
    const col=t>0.5?'#00cec9':'#e84393';ctx.shadowColor=col;ctx.shadowBlur=6;
    ctx.fillStyle=t>0.5?`rgba(0,206,201,${glow})`:`rgba(232,67,147,${glow})`;
    ctx.beginPath();ctx.moveTo(0,-d.size);ctx.quadraticCurveTo(d.size*0.55,-d.size*0.15,0,d.size*0.45);ctx.quadraticCurveTo(-d.size*0.55,-d.size*0.15,0,-d.size);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.arc(-1,-d.size*0.35,1.6,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.restore();
  }
}

function drawParticles(){
  for(const p of particles){
    const sx=p.x-cameraX;if(sx<-8||sx>W+8)continue;
    const a=p.life/p.maxLife;let c;
    switch(p.type){
      case'pink':c=`rgba(232,67,147,${a})`;break;
      case'neon':c=Math.random()>0.5?`rgba(232,67,147,${a})`:`rgba(0,206,201,${a})`;break;
      case'glow':c=`rgba(255,126,179,${a})`;break;
      case'damage':c=`rgba(255,50,50,${a})`;break;
      case'trail':c=`rgba(232,67,147,${a*0.45})`;break;
      default:c=`rgba(160,120,200,${a})`;
    }
    ctx.fillStyle=c;ctx.beginPath();ctx.arc(sx,p.y,p.size*a,0,Math.PI*2);ctx.fill();
  }
}

function drawVignette(){
  const t=phase===1?transitionProgress:0;
  const va=t>0.5?0.12:0.3;
  const vg=ctx.createRadialGradient(W/2,H/2,H*0.35,W/2,H/2,H*0.85);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,`rgba(4,2,8,${va})`);
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
}

// Helpers
function lC(h1,h2,t){const[r1,g1,b1]=hR(h1),[r2,g2,b2]=hR(h2);return`rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;}
function hR(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
